<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Время Намаза</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --friday-bg: #064e3b;
            --friday-text: #6ee7b7;
            --holiday-bg: #7c2d12;
            --holiday-text: #fdba74;
            --border: #334155;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        
        h1 { text-align: center; color: var(--accent); margin: 0 0 5px 0; font-size: 28px; text-transform: uppercase; letter-spacing: 1px; }
        #city-name { text-align: center; color: var(--text-muted); margin-bottom: 10px; font-size: 18px; font-weight: 500; }

        /* Крупный заголовок периода */
        .period-header { text-align: center; margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .period-header h2 { margin: 0; color: #fff; font-size: 24px; }

        .controls { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        select, input { padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: #1e293b; color: white; font-size: 16px; outline: none; min-width: 120px; }
        
        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #0f172a; color: var(--accent); padding: 18px 10px; text-align: center; font-weight: 700; font-size: 14px; text-transform: uppercase; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--accent); }
        td { padding: 14px 8px; text-align: center; border-bottom: 1px solid var(--border); font-size: 15px; vertical-align: middle; }
        
        tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        tr:hover { background: rgba(56, 189, 248, 0.05); }

        /* Ячейка даты: ТОЛЬКО ЧИСЛО И ДЕНЬ */
        .date-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-width: 70px; }
        .day-num { font-size: 22px; font-weight: 800; color: var(--text-main); line-height: 1; }
        .day-name { font-size: 13px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        
        .friday { background: rgba(6, 78, 59, 0.4) !important; border-left: 4px solid var(--friday-text); }
        .friday .day-num { color: var(--friday-text); }
        .friday .day-name { color: #a7f3d0; }
        
        .holiday { background: rgba(124, 45, 18, 0.4) !important; border-left: 4px solid #f59e0b; }
        .holiday .day-num { color: var(--holiday-text); }
        .holiday .day-name { color: #fcd34d; }
        .holiday-badge { font-size: 10px; background: #f59e0b; color: #000; padding: 3px 6px; border-radius: 4px; margin-top: 4px; font-weight: 800; text-transform: uppercase; }

        .prayer-time { font-family: 'Consolas', 'Monaco', monospace; font-weight: 700; color: var(--text-main); letter-spacing: 0.5px; font-size: 16px; }
        
        button { background: linear-gradient(135deg, var(--accent), #0ea5e9); color: #0f172a; border: none; padding: 14px 30px; border-radius: 10px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 25px; transition: all 0.2s; width: 100%; max-width: 350px; text-transform: uppercase; }
        button:hover { transform: translateY(-2px); filter: brightness(1.05); }

        @media (max-width: 600px) {
            .controls { flex-direction: column; }
            select, input { width: 100%; box-sizing: border-box; }
            .day-num { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="container" id="capture-area">
    <h1>🕌 Время Намаза</h1>
    <div id="city-name">Загрузка...</div>
    
    <!-- Заголовок с Месяцем и Годом -->
    <div class="period-header">
        <h2 id="period-title">Месяц Год</h2>
    </div>

    <div class="controls">
        <input type="number" id="year-input" placeholder="Год" min="2020" max="2050">
        <select id="month-select"></select>
        <button onclick="renderTable()" style="margin:0; width: auto; padding: 12px 25px;">Обновить</button>
    </div>

    <div class="table-wrapper">
        <table id="prayer-table">
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Фаджр</th>
                    <th>Восход</th>
                    <th>Зухр</th>
                    <th>Аср (Шафи)</th>
                    <th>Аср (Ханафи)</th>
                    <th>Магриб</th>
                    <th>Иша</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<button onclick="downloadImage()">📸 Сохранить расписание</button>

<script>
    let cityLat = 55.7887;
    let cityLng = 49.1221;
    let cityName = "Казань";

    const params = new URLSearchParams(window.location.search);
    if(params.has('city')) cityName = decodeURIComponent(params.get('city'));
    if(params.has('lat')) cityLat = parseFloat(params.get('lat'));
    if(params.has('lng')) cityLng = parseFloat(params.get('lng'));

    document.getElementById('city-name').innerText = `📍 ${cityName}`;
    
    const currentYear = new Date().getFullYear();
    document.getElementById('year-input').value = currentYear;

    const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    const monthSelect = document.getElementById('month-select');
    const periodTitle = document.getElementById('period-title');
    
    months.forEach((m, i) => {
        let opt = document.createElement('option');
        opt.value = i + 1; 
        opt.innerText = m;
        if(i === new Date().getMonth()) opt.selected = true;
        monthSelect.appendChild(opt);
    });

    function updateTitle() {
        const y = document.getElementById('year-input').value;
        const mIdx = parseInt(document.getElementById('month-select').value) - 1;
        periodTitle.innerText = `${months[mIdx]} ${y}`;
    }
    
    document.getElementById('year-input').addEventListener('change', updateTitle);
    document.getElementById('month-select').addEventListener('change', updateTitle);
    updateTitle();

    async function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '<tr><td colspan="8" style="padding: 30px;">Загрузка...</td></tr>';
        
        const year = parseInt(document.getElementById('year-input').value);
        const month = parseInt(document.getElementById('month-select').value);
        
        updateTitle();

        const url = `https://api.aladhan.com/v1/calendarByCity?city=${encodeURIComponent(cityName)}&country=Russia&method=99&fajrAngle=18&ishaAngle=15&year=${year}&month=${month}`;
        
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            
            if(data.code !== 200) throw new Error('API Error');
            
            tbody.innerHTML = '';
            const days = data.data;
            
            const weekDaysShort = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

            days.forEach(day => {
                const gregorian = day.date.gregorian;
                const hijri = day.date.hijri;
                const t = day.timings;
                
                // Точный расчет дня недели
                const parts = gregorian.date.split('-');
                const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
                const dayOfWeek = dateObj.getDay(); 
                
                let holidayName = null;
                const hDay = parseInt(hijri.day);
                const hMonth = parseInt(hijri.month.number);
                
                if (hMonth === 10 && hDay === 1) holidayName = "Ураза-байрам";
                if (hMonth === 12 && hDay === 10) holidayName = "Курбан-байрам";

                let rowClass = '';
                if (holidayName) rowClass = 'holiday';
                else if (dayOfWeek === 5) rowClass = 'friday';

                // ФОРМАТ ЯЧЕЙКИ: Только число и день недели
                const dateCell = `
                    <div class="date-cell">
                        <span class="day-num">${parts[2]}</span>
                        <span class="day-name">${weekDaysShort[dayOfWeek]}</span>
                        ${holidayName ? `<span class="holiday-badge">${holidayName}</span>` : ''}
                    </div>
                `;

                let asrShafi = t.Asr;
                let asrHanafi = addMinutes(t.Asr, 50); 

                const row = `
                    <tr class="${rowClass}">
                        <td>${dateCell}</td>
                        <td class="prayer-time">${t.Fajr}</td>
                        <td class="prayer-time">${t.Sunrise}</td>
                        <td class="prayer-time">${t.Dhuhr}</td>
                        <td class="prayer-time">${asrShafi}</td>
                        <td class="prayer-time">${asrHanafi}</td>
                        <td class="prayer-time">${t.Maghrib}</td>
                        <td class="prayer-time">${t.Isha}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="8" style="padding: 20px; color: #ef4444;">Ошибка загрузки.</td></tr>';
        }
    }

    function addMinutes(timeStr, mins) {
        if(!timeStr) return "--:--";
        const [h, m] = timeStr.split(':').map(Number);
        const date = new Date();
        date.setHours(h, m + mins, 0, 0);
        return date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
    }

    function downloadImage() {
        const area = document.getElementById('capture-area');
        html2canvas(area, { scale: 2, backgroundColor: '#1e293b', useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            const y = document.getElementById('year-input').value;
            const m = document.getElementById('month-select').options[document.getElementById('month-select').selectedIndex].text;
            link.download = `Namaz-${cityName}-${m}-${y}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    renderTable();
</script>

</body>
</html>
