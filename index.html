<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Время Намаза</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --friday-bg: #064e3b;
            --friday-text: #6ee7b7;
            --holiday-bg: #7c2d12;
            --holiday-text: #fdba74;
            --border: #334155;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        h1 { text-align: center; color: var(--accent); margin-bottom: 5px; font-size: 24px; }
        #city-name { text-align: center; color: var(--text-muted); margin-bottom: 20px; font-size: 16px; }

        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; background: #0f172a; padding: 10px; border-radius: 12px; }
        select, input { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border); background: #1e293b; color: white; font-size: 16px; outline: none; }
        select:focus, input:focus { border-color: var(--accent); }
        
        /* Таблица */
        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #0f172a; color: var(--accent); padding: 15px; text-align: center; font-weight: 600; position: sticky; top: 0; }
        td { padding: 12px 8px; text-align: center; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        tr:hover { background: rgba(255,255,255,0.05); }

        /* Стили для дней */
        .day-cell { font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .day-num { font-size: 18px; }
        .day-name { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        
        .friday { background: var(--friday-bg) !important; color: var(--friday-text); }
        .friday .day-name { color: #a7f3d0; }
        
        .holiday { background: var(--holiday-bg) !important; color: var(--holiday-text); border: 1px solid #f59e0b; }
        .holiday .day-name { color: #fcd34d; }
        .holiday-badge { font-size: 10px; background: #f59e0b; color: #000; padding: 2px 6px; border-radius: 4px; margin-top: 4px; font-weight: bold; }

        .prayer-time { font-family: 'Courier New', monospace; font-weight: 600; letter-spacing: 0.5px; }
        
        button { background: var(--accent); color: #0f172a; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.2s; width: 100%; max-width: 300px; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        @media (max-width: 600px) {
            .controls { flex-direction: column; }
            select, input { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div class="container" id="capture-area">
    <h1>🕌 Время Намаза</h1>
    <div id="city-name">Загрузка...</div>
    
    <div class="controls">
        <input type="number" id="year-input" placeholder="Год" min="2020" max="2050" value="2026">
        <select id="month-select"></select>
        <button onclick="renderTable()" style="margin:0; width: auto; padding: 10px 20px;">Показать</button>
    </div>

    <div class="table-wrapper">
        <table id="prayer-table">
            <thead>
                <tr>
                    <th style="min-width: 100px;">Дата</th>
                    <th>Фаджр</th>
                    <th>Восход</th>
                    <th>Зухр</th>
                    <th>Аср (Шафи)</th>
                    <th>Аср (Ханафи)</th>
                    <th>Магриб</th>
                    <th>Иша</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<button onclick="downloadImage()">📸 Сохранить как картинку</button>

<script>
    let cityLat = 55.7887;
    let cityLng = 49.1221;
    let cityName = "Казань";

    const params = new URLSearchParams(window.location.search);
    if(params.has('city')) cityName = decodeURIComponent(params.get('city'));
    if(params.has('lat')) cityLat = parseFloat(params.get('lat'));
    if(params.has('lng')) cityLng = parseFloat(params.get('lng'));

    document.getElementById('city-name').innerText = `📍 ${cityName}`;
    document.getElementById('year-input').value = new Date().getFullYear();

    const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    const monthSelect = document.getElementById('month-select');
    months.forEach((m, i) => {
        let opt = document.createElement('option');
        opt.value = i + 1; // API использует 1-12
        opt.innerText = m;
        if(i === new Date().getMonth()) opt.selected = true;
        monthSelect.appendChild(opt);
    });

    // Определение праздников (приблизительные даты по григорианскому календарю для примера, 
    // в реальном проекте лучше использовать API исламского календаря для точности)
    // Здесь реализована простая логика: если дата совпадает с известными днями (примерно)
    function getHolidayName(date) {
        const d = date.getDate();
        const m = date.getMonth() + 1;
        const y = date.getFullYear();
        
        // Примерные даты для 2026 года (нужно корректировать каждый год или использовать API)
        // Для демо выделим фиксированные дни или используем внешний API Hijri
        // В данном коде мы будем запрашивать Hijri дату из API aladhan и проверять её
        
        return null; // Логика будет внутри fetch
    }

    async function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '<tr><td colspan="8" style="padding: 20px;">Загрузка данных...</td></tr>';
        
        const year = parseInt(document.getElementById('year-input').value);
        const month = parseInt(document.getElementById('month-select').value);
        
        // Используем API Aladhan для получения календаря + Хиджры (для праздников)
        // Метод 99 (Custom) с углами 18/15
        const url = `https://api.aladhan.com/v1/calendarByCity?city=${encodeURIComponent(cityName)}&country=Russia&method=99&fajrAngle=18&ishaAngle=15&year=${year}&month=${month}`;
        
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            
            if(data.code !== 200) throw new Error('API Error');
            
            tbody.innerHTML = '';
            const days = data.data;
            
            const weekDays = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

            days.forEach(day => {
                const gregorian = day.date.gregorian;
                const hijri = day.date.hijri;
                const t = day.timings;
                
                // Парсим дату для определения дня недели
                const dateObj = new Date(gregorian.date);
                const dayOfWeek = dateObj.getDay(); // 0 = Вс, 5 = Пт
                
                // Определение праздников по Хиджре
                let holidayName = null;
                const hDay = parseInt(hijri.day);
                const hMonth = hijri.month.number;
                
                // 1 Шавваль - Ураза Байрам, 10 Зуль-Хиджа - Курбан Байрам
                if (hMonth === 10 && hDay === 1) holidayName = "Ураза-байрам";
                if (hMonth === 12 && hDay === 10) holidayName = "Курбан-байрам";

                let rowClass = '';
                if (dayOfWeek === 5) rowClass = 'friday'; // Пятница
                if (holidayName) rowClass = 'holiday'; // Праздник приоритетнее или можно комбинировать

                const dateCell = `
                    <div class="day-cell">
                        <span class="day-num">${gregorian.date.split('-')[2]}</span>
                        <span class="day-name">${weekDays[dayOfWeek]}</span>
                        ${holidayName ? `<span class="holiday-badge">${holidayName}</span>` : ''}
                    </div>
                `;

                const row = `
                    <tr class="${rowClass}">
                        <td>${dateCell}</td>
                        <td class="prayer-time">${t.Fajr}</td>
                        <td class="prayer-time">${t.Sunrise}</td>
                        <td class="prayer-time">${t.Dhuhr}</td>
                        <td class="prayer-time">${t.Asr}</td>
                        <td class="prayer-time">${t.Asr}</td> 
                        <td class="prayer-time">${t.Maghrib}</td>
                        <td class="prayer-time">${t.Isha}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        } catch (e) {
            console.error(e);
            tbody.innerHTML = '<tr><td colspan="8">Ошибка загрузки данных. Проверьте интернет.</td></tr>';
        }
    }

    function downloadImage() {
        const area = document.getElementById('capture-area');
        html2canvas(area, { scale: 2, backgroundColor: '#1e293b' }).then(canvas => {
            const link = document.createElement('a');
            link.download = `namaz-${cityName}-${document.getElementById('year-input').value}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    // Initial load
    renderTable();
</script>

</body>
</html>
